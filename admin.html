<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Najs · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
@font-face{font-family:'Stigma Serif Display';src:url('Stigma_Display_Typeface.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
:root{--bez:#e5ccb2;--bez2:#f4e9dc;--navy:#2c4251;--coral:#d06666;--serif:'Stigma Serif Display','Cormorant Garamond',Georgia,serif;--sans:'Poppins','Jost',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bez2);color:var(--navy);min-height:100vh}
.hidden{display:none!important}
a{color:inherit}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-card{background:#fff;border-radius:18px;box-shadow:0 10px 40px rgba(23,57,75,.12);padding:2.4rem 2rem;width:100%;max-width:380px;text-align:center}
.login-card .login-logo{width:100%;max-width:230px;height:auto;display:block;margin:0 auto .4rem}
.login-card .sub{font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;color:var(--coral);margin-bottom:1.6rem}
.field{text-align:left;margin-bottom:1rem}
.field label{display:block;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;opacity:.6;margin-bottom:.35rem}
.field input{width:100%;padding:.7rem .8rem;border:1.5px solid rgba(23,57,75,.15);border-radius:10px;font-family:var(--sans);font-size:.95rem;color:var(--navy)}
.field input:focus{outline:none;border-color:var(--coral)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;border:none;border-radius:999px;cursor:pointer;font-family:var(--sans);transition:.2s}
.btn-main{background:var(--coral);color:#fff;padding:.75rem 1.4rem;font-size:.85rem;width:100%}
.btn-main:hover{filter:brightness(.95)}
.btn-main:disabled{opacity:.6}
.msg{font-size:.82rem;margin-top:.9rem;min-height:1em}
.msg.err{color:#b04a3a}

header{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:0 4%;height:60px;background:rgba(234,215,193,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(23,57,75,.1)}
header .brand{display:flex;align-items:center;gap:.55rem}
header .brand .logo-img{height:36px;width:auto;display:block}
header .brand .brand-tag{font-family:var(--sans);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;opacity:.55}
header .right{display:flex;align-items:center;gap:.9rem}
header .who{font-size:.74rem;opacity:.65}
.btn-ghost{background:#fff;border:1.5px solid rgba(23,57,75,.2);color:var(--navy);padding:.45rem .9rem;font-size:.74rem;border-radius:999px;cursor:pointer}
.btn-ghost:hover{border-color:var(--coral);color:var(--coral)}

.toolbar{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;padding:1rem 1.5rem .4rem}
.nav-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(23,57,75,.15);background:#fff;cursor:pointer;font-size:1rem;color:var(--navy)}
.nav-btn:hover{border-color:var(--coral);color:var(--coral)}
.range{font-family:var(--serif);font-size:1.25rem;margin:0 .4rem;min-width:160px}
.seg{display:flex;border:1.5px solid rgba(23,57,75,.15);border-radius:999px;overflow:hidden;background:#fff;margin-left:auto;flex-wrap:wrap}
.seg button{border:none;background:transparent;padding:.45rem .85rem;font-size:.76rem;cursor:pointer;color:var(--navy);font-family:var(--sans)}
.seg button.active{background:var(--navy);color:#fff}

.wrap{padding:.4rem 1.5rem 3rem}
.layout{display:flex;gap:1.2rem;align-items:flex-start}
.side{width:230px;flex-shrink:0;position:sticky;top:72px}
.main{flex:1;min-width:0}
.mini-stack{max-height:calc(100vh - 96px);overflow-y:auto;display:flex;flex-direction:column;gap:.8rem;padding-right:4px}
.mini-stack::-webkit-scrollbar{width:6px}
.mini-stack::-webkit-scrollbar-thumb{background:rgba(23,57,75,.2);border-radius:3px}
@media(max-width:820px){.layout{flex-direction:column;align-items:stretch}.main{width:100%}.side{width:100%;max-width:none;position:static}.mini-stack{max-height:none}.cal.multi{min-width:0}.who{display:none}.toolbar{padding:.8rem 1rem .4rem;gap:.5rem}.wrap{padding:.4rem 1rem 3rem}.range{flex:1 1 auto;text-align:right;font-size:1.05rem;min-width:0;margin:0}#newBtn,#blockToggle{flex:1 1 0;text-align:center}.seg{width:100%;margin-left:0;flex-wrap:nowrap;margin-top:.1rem}.seg button{flex:1;padding:.5rem .15rem;font-size:.72rem;text-align:center}}

/* Mini koledar */
.mini{background:#fff;border-radius:14px;box-shadow:0 2px 14px rgba(23,57,75,.07);padding:.9rem}
.mini-head{display:flex;align-items:center;justify-content:center;margin-bottom:.5rem;font-family:var(--serif);font-size:1.05rem}
.mini-day.empty{visibility:hidden;cursor:default}
.mini-nav{border:none;background:transparent;cursor:pointer;font-size:1.1rem;color:var(--navy);padding:.1rem .45rem;border-radius:6px}
.mini-nav:hover{color:var(--coral)}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mini-dow{font-size:.6rem;text-align:center;opacity:.5;padding:.2rem 0}
.mini-day{border:none;background:transparent;cursor:pointer;font-size:.74rem;padding:.35rem 0;border-radius:8px;color:var(--navy)}
.mini-day:hover{background:rgba(206,126,111,.12)}
.mini-day.out{opacity:.3}
.mini-day.today{color:var(--coral);font-weight:600}
.mini-day.sel{background:var(--navy);color:#fff}

/* Časovni koledar */
.cal-scroll{overflow-x:auto;background:#fff;border-radius:14px;box-shadow:0 2px 16px rgba(23,57,75,.08)}
.cal{min-width:100%}
.cal.multi{min-width:660px}
.cal-head{display:grid;position:sticky;top:0;background:#fff;z-index:5;border-bottom:1px solid #eceae6}
.cal-body{display:grid}
.dayhead{padding:.6rem .3rem;text-align:center;border-left:1px solid #f0eee9}
.dayhead .dow{font-size:.64rem;letter-spacing:.1em;opacity:.55;text-transform:uppercase}
.dayhead .dnum{font-family:var(--serif);font-size:1.3rem;line-height:1}
.dayhead.today .dnum{color:var(--coral)}
.dayhead.off{background:repeating-linear-gradient(45deg,#fafafa,#fafafa 6px,#f2f2f2 6px,#f2f2f2 12px)}
.dayhead.arr{background:rgba(206,126,111,.08)}
.gutter{position:relative;height:624px}
.gutter .hr{position:absolute;right:6px;font-size:.64rem;opacity:.5;transform:translateY(-50%)}
.col{position:relative;height:624px;border-left:1px solid #f0eee9;background:repeating-linear-gradient(to bottom,transparent,transparent 51px,#f0f1f1 51px,#f0f1f1 52px)}
.off-band{position:absolute;left:0;right:0;pointer-events:none;z-index:0;background:repeating-linear-gradient(45deg,rgba(23,57,75,.035),rgba(23,57,75,.035) 7px,rgba(23,57,75,.07) 7px,rgba(23,57,75,.07) 14px)}
.off-band.arr{background:repeating-linear-gradient(45deg,rgba(206,126,111,.06),rgba(206,126,111,.06) 7px,rgba(206,126,111,.12) 7px,rgba(206,126,111,.12) 14px)}
.ev{position:absolute;left:3px;right:3px;z-index:2;border-radius:7px;padding:3px 6px;font-size:.7rem;line-height:1.2;cursor:pointer;overflow:hidden;border-left:3px solid var(--coral);background:#f3eee7;color:var(--navy)}
.ev:hover{filter:brightness(.97);box-shadow:0 2px 8px rgba(23,57,75,.15)}
.ev .ev-t{font-size:.62rem;opacity:.7}
.ev .ev-n{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev .ev-s{opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev.potrjeno{background:#e6f0e9;border-left-color:#3f8f5b}
.ev.opravljeno{background:#e4e9ec;border-left-color:var(--navy);opacity:.85}
.ev.preklicano{background:#f2e3e0;border-left-color:#b04a3a;opacity:.5;text-decoration:line-through}
.ev.block{background:repeating-linear-gradient(45deg,#fff,#fff 7px,rgba(206,126,111,.14) 7px,rgba(206,126,111,.14) 14px);border-left:3px dashed var(--coral);color:var(--coral)}

/* Mesečni pregled */
.month{background:#fff;border-radius:14px;box-shadow:0 2px 16px rgba(23,57,75,.08);padding:1rem}
.month .mhead{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.month .mhead div{text-align:center;font-size:.64rem;letter-spacing:.08em;opacity:.55;text-transform:uppercase}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.mcell{position:relative;min-height:74px;border:1px solid #f0eee9;border-radius:10px;background:#fff;cursor:pointer;text-align:left;padding:.4rem;color:var(--navy)}
.mcell:hover{border-color:var(--coral)}
.mcell .mnum{font-family:var(--serif);font-size:1.05rem}
.mcell.out{opacity:.4}
.mcell.today{border-color:var(--coral);box-shadow:0 0 0 2px rgba(206,126,111,.2)}
.mcell.off{background:repeating-linear-gradient(45deg,#fafafa,#fafafa 6px,#f2f2f2 6px,#f2f2f2 12px)}
.mcell .mcount{position:absolute;right:.4rem;bottom:.4rem;background:var(--coral);color:#fff;font-size:.66rem;border-radius:999px;padding:.05rem .45rem}
@media(max-width:560px){.mcell{min-height:54px;padding:.3rem}.mcell .mnum{font-size:.9rem}}

/* Nujni seznam */
.cards{display:flex;flex-direction:column;gap:.8rem}
.empty{text-align:center;opacity:.55;padding:2.5rem 0;font-style:italic}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 14px rgba(23,57,75,.07);padding:1rem 1.1rem;display:flex;gap:1rem;align-items:flex-start;flex-wrap:wrap}
.card .body{flex:1;min-width:200px}
.card .svc{font-weight:500;margin-bottom:.25rem}
.card .meta{font-size:.82rem;opacity:.8;line-height:1.5}
.card .meta a{color:var(--coral);text-decoration:none}
.card .side2{display:flex;flex-direction:column;align-items:flex-end;gap:.5rem}
.price{font-family:var(--serif);font-size:1.2rem;font-weight:600}

.badge{font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;padding:.2rem .6rem;border-radius:999px;display:inline-block}
.badge.nova{background:rgba(23,57,75,.1);color:var(--navy)}
.badge.potrjeno{background:rgba(70,140,90,.16);color:#2f6b43}
.badge.opravljeno{background:rgba(23,57,75,.85);color:#fff}
.badge.preklicano{background:rgba(176,74,58,.15);color:#b04a3a}
.badge.podogovoru{background:rgba(206,126,111,.18);color:var(--coral)}
.act{font-size:.72rem;padding:.4rem .7rem;border-radius:999px;border:1.5px solid rgba(23,57,75,.18);background:#fff;cursor:pointer;color:var(--navy)}
.act:hover{border-color:var(--coral);color:var(--coral)}
.act.danger:hover{border-color:#b04a3a;color:#b04a3a}

.overlay{position:fixed;inset:0;z-index:50;background:rgba(23,57,75,.4);display:flex;align-items:center;justify-content:center;padding:1.2rem}
.pop{background:#fff;border-radius:16px;box-shadow:0 18px 50px rgba(23,57,75,.25);width:100%;max-width:420px;padding:1.5rem;position:relative}
.pop .x{position:absolute;top:.7rem;right:.9rem;border:none;background:transparent;font-size:1.4rem;cursor:pointer;color:var(--navy)}
.pop .d-date{font-size:.78rem;opacity:.6}
.pop .d-time{font-family:var(--serif);font-size:1.5rem;font-weight:600;margin:.1rem 0 .5rem}
.pop .d-svc{font-weight:500;margin-bottom:.5rem}
.pop .d-meta{font-size:.86rem;opacity:.85;line-height:1.6;margin-bottom:.6rem}
.pop .d-meta a{color:var(--coral);text-decoration:none}
.pop .d-note{font-size:.84rem;font-style:italic;opacity:.75;border-left:2px solid var(--coral);padding-left:.5rem;margin-bottom:.6rem}
.pop .d-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.pop .d-actions{display:flex;gap:.4rem;flex-wrap:wrap}

.tip{position:fixed;z-index:60;pointer-events:none;background:#fff;border:1px solid rgba(23,57,75,.12);box-shadow:0 8px 28px rgba(23,57,75,.18);border-radius:12px;padding:.65rem .8rem;max-width:250px;font-size:.8rem;line-height:1.45;color:var(--navy)}
.tip .tip-t{font-family:var(--serif);font-size:1.05rem;font-weight:600}
.tip .tip-n{font-weight:500}
.tip .tip-row{opacity:.82}
.tip .tip-foot{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-top:.4rem}
.tip .tip-price{font-family:var(--serif);font-weight:600}

.pop-wide{max-width:560px;max-height:90vh;overflow-y:auto}
.nb-title{font-family:var(--serif);font-weight:300;font-size:1.6rem;margin-bottom:1rem}
.nb-grid{display:flex;gap:1rem;flex-wrap:wrap}
.nb-grid label{flex:1;min-width:140px}
.pop-wide label{display:block;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;opacity:.65;margin-bottom:.8rem}
.pop-wide input{display:block;width:100%;margin-top:.3rem;padding:.55rem .7rem;border:1.5px solid rgba(23,57,75,.15);border-radius:10px;font-family:var(--sans);color:var(--navy)}
.pop-wide input:focus{outline:none;border-color:var(--coral)}
.nb-svc-label{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;opacity:.65;margin-bottom:.4rem}
.nb-services{max-height:240px;overflow-y:auto;border:1.5px solid rgba(23,57,75,.12);border-radius:12px;padding:.5rem .8rem;margin-bottom:.8rem}
.nb-cat{font-family:var(--serif);font-size:1.05rem;margin:.7rem 0 .25rem}
.nb-cat:first-child{margin-top:0}
.nb-item{display:flex;align-items:center;gap:.6rem;padding:.32rem 0;font-size:.86rem;cursor:pointer;margin:0}
.nb-item input{width:auto!important;margin:0!important;display:inline-block!important}
.nb-item .nb-dur{margin-left:auto;opacity:.6;font-size:.78rem;white-space:nowrap}
.nb-item .nb-price{font-family:var(--serif);font-weight:600;min-width:62px;text-align:right}
.nb-summary{background:var(--bez2);border-radius:10px;padding:.7rem .9rem;margin-bottom:.9rem;font-size:.88rem;min-height:1.2em}
.nb-actions{display:flex;gap:.6rem;align-items:center}

.stranke{max-width:760px}
.stranke .search{width:100%;padding:.7rem .9rem;border:1.5px solid rgba(23,57,75,.15);border-radius:12px;font-family:var(--sans);font-size:.95rem;color:var(--navy);margin-bottom:1rem;background:#fff}
.stranke .search:focus{outline:none;border-color:var(--coral)}
.cust{background:#fff;border-radius:14px;box-shadow:0 2px 14px rgba(23,57,75,.07);margin-bottom:.7rem;overflow:hidden}
.cust-head{display:flex;align-items:flex-start;gap:.8rem;padding:.9rem 1.1rem;cursor:pointer}
.cust-head .cust-name{font-weight:500}
.cust-head .cust-sub{font-size:.8rem;opacity:.7}
.cust-head .cust-meta{margin-left:auto;text-align:right;font-size:.76rem;opacity:.65;white-space:nowrap}
.cust-hist{border-top:1px solid #f0eee9;padding:.2rem 1.1rem .7rem}
.hist-row{display:flex;align-items:center;gap:.6rem;padding:.5rem 0;font-size:.84rem;cursor:pointer;border-bottom:1px solid #f6f3ee;flex-wrap:wrap}
.hist-row:last-child{border-bottom:none}
.hist-row .h-date{min-width:120px;opacity:.8}
.hist-row .h-svc{flex:1;min-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-row .h-price{font-family:var(--serif);font-weight:600}

.block-form{background:#fff;border-radius:14px;box-shadow:0 2px 14px rgba(23,57,75,.07);padding:1.1rem;margin-bottom:1rem;max-width:560px}
.block-form .bf-row{display:flex;gap:1rem;flex-wrap:wrap}
.block-form label{display:block;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;opacity:.65;margin-bottom:.9rem}
.block-form input{display:block;margin-top:.3rem;padding:.55rem .7rem;border:1.5px solid rgba(23,57,75,.15);border-radius:10px;font-family:var(--sans);color:var(--navy)}
.block-form input[type=text]{width:100%}
.block-form .bf-actions{display:flex;gap:.6rem;align-items:center}
@media(max-width:700px){.range{min-width:110px;font-size:1.05rem}}
</style>
</head>
<body>

<div class="login-wrap" id="loginView">
  <div class="login-card">
    <img src="logo.png" alt="Frizerski studio Najs" class="login-logo" />
    <p class="sub">Administracija</p>
    <div class="field"><label>E-pošta</label><input type="email" id="email" autocomplete="username" placeholder="vasa@posta.si" /></div>
    <div class="field"><label>Geslo</label><input type="password" id="password" autocomplete="current-password" placeholder="********" /></div>
    <button class="btn btn-main" id="loginBtn">Prijava</button>
    <p class="msg" id="loginMsg"></p>
  </div>
</div>

<div id="appView" class="hidden">
  <header>
    <div class="brand"><img src="logo.png" alt="Frizerski studio Najs" class="logo-img" /><span class="brand-tag">admin</span></div>
    <div class="right"><span class="who" id="whoLabel"></span><button class="btn-ghost" id="logoutBtn">Odjava</button></div>
  </header>

  <div class="toolbar">
    <button class="btn-ghost" id="todayBtn">Danes</button>
    <button class="nav-btn" id="prevBtn">&#8249;</button>
    <button class="nav-btn" id="nextBtn">&#8250;</button>
    <span class="range" id="rangeLabel"></span>
    <button class="btn-ghost" id="newBtn">+ Nova rezervacija</button>
    <button class="btn-ghost" id="blockToggle">&#9210; Blokiraj čas</button>
    <div class="seg">
      <button data-mode="day" class="active">Dan</button>
      <button data-mode="workweek">Delovni teden</button>
      <button data-mode="week">Teden</button>
      <button data-mode="month">Mesec</button>
      <button data-mode="nujni">Nujni</button>
      <button data-mode="stranke">Stranke</button>
    </div>
  </div>

  <div class="wrap">
    <div class="block-form hidden" id="blockForm">
      <div class="bf-row">
        <label>Datum<input type="date" id="blkDate"></label>
        <label>Od<input type="time" id="blkFrom" step="900"></label>
        <label>Do<input type="time" id="blkTo" step="900"></label>
      </div>
      <label>Opomba (neobvezno)<input type="text" id="blkNote" placeholder="npr. malica, dopust"></label>
      <div class="bf-actions">
        <button class="btn btn-main" id="blkSave" style="width:auto;padding:.55rem 1.3rem">Shrani blokado</button>
        <button class="btn-ghost" id="blkCancel">Prekliči</button>
      </div>
      <p class="msg" id="blkMsg"></p>
    </div>

    <div class="layout">
      <aside class="side"><div class="mini-stack" id="mini"></div></aside>
      <div class="main">
        <div class="cal-scroll" id="calScroll"></div>
        <div class="cards hidden" id="nujniList"></div>
        <div class="stranke hidden" id="strankeView"></div>
      </div>
    </div>
  </div>
</div>

<div class="overlay hidden" id="detail">
  <div class="pop"><button class="x" id="detailClose">&times;</button><div id="detailBody"></div></div>
</div>
<div id="tip" class="tip hidden"></div>

<div class="overlay hidden" id="newbk">
  <div class="pop pop-wide">
    <button class="x" id="newClose">&times;</button>
    <h2 class="nb-title">Nova rezervacija</h2>
    <div class="nb-grid">
      <label>Datum<input type="date" id="nbDate"></label>
      <label>Ura začetka<input type="time" id="nbTime" step="900"></label>
    </div>
    <div class="nb-svc-label">Storitve</div>
    <div class="nb-services" id="nbServices"></div>
    <div class="nb-summary" id="nbSummary"></div>
    <div class="nb-grid">
      <label>Ime in priimek<input type="text" id="nbName" list="custNames" placeholder="npr. Ana Novak"></label>
      <label>Telefon<input type="tel" id="nbPhone" placeholder="npr. 031 234 567"></label>
    </div>
    <label class="nb-full">E-pošta (neobvezno)<input type="email" id="nbEmail"></label>
    <label class="nb-full">Opomba (neobvezno)<input type="text" id="nbNote"></label>
    <datalist id="custNames"></datalist>
    <p class="msg" id="nbMsg"></p>
    <div class="nb-actions">
      <button class="btn btn-main" id="nbSave" style="width:auto;padding:.6rem 1.5rem">Shrani rezervacijo</button>
      <button class="btn-ghost" id="nbCancel">Prekliči</button>
    </div>
  </div>
</div>

<script>
var SB_URL='https://azqtgvxashunmmydkwop.supabase.co';
var SB_KEY='sb_publishable_Sjlg-Y5ve3QRSQY-6usn6g_tB6Tgdsg';
var sb=supabase.createClient(SB_URL,SB_KEY);

var loginView=document.getElementById('loginView'),appView=document.getElementById('appView');
var calScroll=document.getElementById('calScroll'),nujniList=document.getElementById('nujniList'),miniEl=document.getElementById('mini');

var H0=6,H1=21,HOUR_PX=52,PXMIN=HOUR_PX/60,TOTAL=(H1-H0)*HOUR_PX;
var DOW=['PON','TOR','SRE','ČET','PET','SOB','NED'];
var DOWF=['PONEDELJEK','TOREK','SREDA','ČETRTEK','PETEK','SOBOTA','NEDELJA'];
var DNI=['nedelja','ponedeljek','torek','sreda','četrtek','petek','sobota'];
var MES=['januar','februar','marec','april','maj','junij','julij','avgust','september','oktober','november','december'];
var mode='day', cur=new Date(); cur.setHours(0,0,0,0);
var miniRef=new Date(cur);
var cache={},blockCache={},SERVICES=[];

function pad(n){return String(n).padStart(2,'0');}
function isoOf(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function isoToday(){return isoOf(new Date());}
function mondayOf(d){var x=new Date(d);var k=(x.getDay()+6)%7;x.setDate(x.getDate()-k);x.setHours(0,0,0,0);return x;}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function addMonths(d,n){var x=new Date(d);x.setDate(1);x.setMonth(x.getMonth()+n);return x;}
function monthGrid(ref){var first=new Date(ref.getFullYear(),ref.getMonth(),1);var s=mondayOf(first);var a=[];for(var i=0;i<42;i++)a.push(addDays(s,i));return a;}
function compactGrid(ref){var first=new Date(ref.getFullYear(),ref.getMonth(),1);var s=mondayOf(first);var dim=new Date(ref.getFullYear(),ref.getMonth()+1,0).getDate();var last=new Date(ref.getFullYear(),ref.getMonth(),dim);var end=addDays(mondayOf(last),6);var n=Math.round((end-s)/86400000)+1;var a=[];for(var i=0;i<n;i++)a.push(addDays(s,i));return a;}
function toMin(t){t=String(t||'').substring(0,5);var p=t.split(':');return (parseInt(p[0])||0)*60+(parseInt(p[1])||0);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function eur(v){return (parseFloat(v)||0).toFixed(2).replace('.',',')+' €';}
function hm(t){return String(t||'').substring(0,5);}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function isMobile(){return window.innerWidth<=820;}
function prettyDate(iso){if(!iso)return '';var p=iso.split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);return DNI[d.getDay()]+', '+(+p[2])+'. '+MES[+p[1]-1]+' '+p[0];}
function dayInfo(dow){if(dow===1||dow===3||dow===4)return {h:[14,20]};if(dow===2||dow===5)return {h:[8,15]};if(dow===6)return {arrangement:true};return {closed:true};}

/* AUTH */
function showApp(s){loginView.classList.add('hidden');appView.classList.remove('hidden');document.getElementById('whoLabel').textContent=s.user.email;buildMini();loadServices();load();}
function showLogin(){appView.classList.add('hidden');loginView.classList.remove('hidden');}
document.getElementById('loginBtn').addEventListener('click',doLogin);
document.getElementById('password').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
function doLogin(){
  var btn=document.getElementById('loginBtn'),msg=document.getElementById('loginMsg');
  var email=document.getElementById('email').value.trim(),pass=document.getElementById('password').value;
  msg.textContent='';msg.className='msg';
  if(!email||!pass){msg.textContent='Vnesi e-pošto in geslo.';msg.className='msg err';return;}
  btn.disabled=true;btn.textContent='Prijavljam …';
  sb.auth.signInWithPassword({email:email,password:pass}).then(function(res){
    btn.disabled=false;btn.textContent='Prijava';
    if(res.error){msg.textContent='Napačna e-pošta ali geslo.';msg.className='msg err';return;}
    showApp(res.data.session);
  });
}
document.getElementById('logoutBtn').addEventListener('click',function(){sb.auth.signOut().then(showLogin);});

/* SEGMENT + NAV */
function setSeg(m){document.querySelectorAll('.seg button').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-mode')===m);});}
document.querySelectorAll('.seg button').forEach(function(b){b.addEventListener('click',function(){mode=b.getAttribute('data-mode');setSeg(mode);load();});});
document.getElementById('todayBtn').addEventListener('click',function(){cur=new Date();cur.setHours(0,0,0,0);miniRef=new Date(cur);load();});
document.getElementById('prevBtn').addEventListener('click',function(){nav(-1);});
document.getElementById('nextBtn').addEventListener('click',function(){nav(1);});
function nav(dir){
  if(mode==='day')cur=addDays(cur,dir);
  else if(mode==='month')cur=addMonths(cur,dir);
  else cur=addDays(cur,dir*7);
  miniRef=new Date(cur);load();
}

/* BLOKADE */
var blockForm=document.getElementById('blockForm');
document.getElementById('blockToggle').addEventListener('click',function(){blockForm.classList.toggle('hidden');if(!blockForm.classList.contains('hidden'))document.getElementById('blkDate').value=isoOf(cur);});
document.getElementById('blkCancel').addEventListener('click',function(){blockForm.classList.add('hidden');document.getElementById('blkMsg').textContent='';});

    blockForm.classList.add('hidden');load();
  });
});

/* MINI KOLEDAR – drseč seznam mesecev */
var MINI_BUILT=false, lastMobile=null;
function miniMonthHTML(ref,withNav){
  var cells=compactGrid(ref),html='<div class="mini"><div class="mini-head">';
  if(withNav)html+='<button class="mini-nav" data-mn="-1">&#8249;</button>';
  html+='<span>'+cap(MES[ref.getMonth()])+' '+ref.getFullYear()+'</span>';
  if(withNav)html+='<button class="mini-nav" data-mn="1">&#8250;</button>';
  html+='</div><div class="mini-grid">';
  ['Po','To','Sr','Če','Pe','So','Ne'].forEach(function(d){html+='<div class="mini-dow">'+d+'</div>';});
  cells.forEach(function(d){
    if(d.getMonth()!==ref.getMonth()){html+='<div class="mini-day empty"></div>';return;}
    html+='<button class="mini-day'+(isoOf(d)===isoToday()?' today':'')+'" data-d="'+isoOf(d)+'">'+d.getDate()+'</button>';
  });
  return html+'</div></div>';
}
var miniDelegated=false;
function ensureMiniDelegation(){
  if(miniDelegated)return;miniDelegated=true;
  miniEl.addEventListener('click',function(e){
    var nav=e.target.closest('.mini-nav');
    if(nav){miniRef=addMonths(miniRef,parseInt(nav.getAttribute('data-mn')));buildMini();return;}
    var day=e.target.closest('.mini-day[data-d]');
    if(day){var p=day.getAttribute('data-d').split('-');cur=new Date(+p[0],+p[1]-1,+p[2]);miniRef=new Date(cur);mode='day';setSeg('day');load();}
  });
}
function adjustSegLabels(){
  var wk=document.querySelector('.seg button[data-mode="week"]'), ww=document.querySelector('.seg button[data-mode="workweek"]');
  if(isMobile()){
    if(wk)wk.style.display='none';
    if(ww){ww.style.display='';ww.textContent='Teden';}
    if(mode==='week'){mode='workweek';setSeg('workweek');}
  } else {
    if(wk){wk.style.display='';wk.textContent='Teden';}
    if(ww){ww.style.display='';ww.textContent='Delovni teden';}
  }
}
function buildMini(){
  ensureMiniDelegation();
  lastMobile=isMobile();
  adjustSegLabels();
  if(lastMobile){
    miniEl.innerHTML=miniMonthHTML(miniRef,true);
  } else {
    var base=addMonths(new Date(),-1); base=new Date(base.getFullYear(),base.getMonth(),1);
    var html='';for(var m=0;m<15;m++){html+=miniMonthHTML(addMonths(base,m),false);}
    miniEl.innerHTML=html;
  }
  MINI_BUILT=true; updateMiniSel();
}
window.addEventListener('resize',function(){ if(isMobile()!==lastMobile){buildMini();load();} else syncMiniHeight(); });
function updateMiniSel(){
  if(!MINI_BUILT)return;
  var prev=miniEl.querySelector('.mini-day.sel'); if(prev)prev.classList.remove('sel');
  var el=miniEl.querySelector('.mini-day[data-d="'+isoOf(cur)+'"]'); if(el)el.classList.add('sel');
}
function syncMiniHeight(){
  if(!MINI_BUILT)return;
  if(window.innerWidth<=820){ miniEl.style.height=''; miniEl.style.maxHeight='320px'; miniEl.querySelectorAll('.mini').forEach(function(m){m.style.minHeight='';}); return; }
  var cal=calScroll.firstElementChild; if(!cal)return;
  var h=cal.offsetHeight; if(!h)return;
  miniEl.style.height=h+'px'; miniEl.style.maxHeight=h+'px';
  var minH=Math.floor((h-2*12)/3);
  miniEl.querySelectorAll('.mini').forEach(function(m){m.style.minHeight=minH+'px';});
}
function resetMiniHeight(){ miniEl.style.height=''; miniEl.style.maxHeight=''; miniEl.querySelectorAll('.mini').forEach(function(m){m.style.minHeight='';}); }

/* NALAGANJE */
function daysForMode(){
  if(mode==='day')return [new Date(cur)];
  var mon=mondayOf(cur);
  if(mode==='workweek')return [0,1,2,3,4].map(function(i){return addDays(mon,i);}); // pon–pet
  return [0,1,2,3,4,5,6].map(function(i){return addDays(mon,i);});
}
function rangeText(days){
  if(mode==='day'){var d=days[0];return cap(DNI[d.getDay()])+', '+d.getDate()+'. '+MES[d.getMonth()]+' '+d.getFullYear();}
  if(mode==='month')return cap(MES[cur.getMonth()])+' '+cur.getFullYear();
  var a=days[0],b=days[days.length-1];return a.getDate()+'. '+MES[a.getMonth()].substring(0,3)+' – '+b.getDate()+'. '+MES[b.getMonth()].substring(0,3)+' '+b.getFullYear();
}
function load(){
  if(isMobile()&&MINI_BUILT){buildMini();}else{updateMiniSel();}
  if(mode==='nujni'){loadNujni();return;}
  if(mode==='stranke'){loadStranke();return;}
  if(mode==='month'){loadMonth();return;}
  calScroll.classList.remove('hidden');nujniList.classList.add('hidden');document.getElementById('strankeView').classList.add('hidden');
  var days=daysForMode();
  document.getElementById('rangeLabel').textContent=rangeText(days);
  var fromISO=isoOf(days[0]),toISO=isoOf(days[days.length-1]);
  calScroll.innerHTML='<div class="empty">Nalagam …</div>';
  Promise.all([
    sb.from('bookings').select('*').gte('booking_date',fromISO).lte('booking_date',toISO),
    sb.from('blocks').select('*').gte('block_date',fromISO).lte('block_date',toISO)
  ]).then(function(r){
    if(r[0].error){calScroll.innerHTML='<div class="empty">Napaka: '+esc(r[0].error.message)+'<br><small>Preveri pravice (RLS).</small></div>';return;}
    renderCal(days,r[0].data||[],(r[1]&&!r[1].error)?(r[1].data||[]):[]);
  });
}
function loadMonth(){
  calScroll.classList.remove('hidden');nujniList.classList.add('hidden');document.getElementById('strankeView').classList.add('hidden');
  document.getElementById('rangeLabel').textContent=rangeText();
  var cells=monthGrid(cur);
  calScroll.innerHTML='<div class="empty">Nalagam …</div>';
  sb.from('bookings').select('booking_date,status').gte('booking_date',isoOf(cells[0])).lte('booking_date',isoOf(cells[41])).then(function(res){
    var counts={};
    if(!res.error)(res.data||[]).forEach(function(b){if(b.status!=='preklicano'){counts[b.booking_date]=(counts[b.booking_date]||0)+1;}});
    renderMonth(cells,counts);
  });
}
function loadNujni(){
  calScroll.classList.add('hidden');nujniList.classList.remove('hidden');document.getElementById('strankeView').classList.add('hidden');resetMiniHeight();
  document.getElementById('rangeLabel').textContent='Nujni / po dogovoru';
  nujniList.innerHTML='<div class="empty">Nalagam …</div>';
  sb.from('bookings').select('*').is('booking_date',null).order('id',{ascending:false}).then(function(res){
    if(res.error){nujniList.innerHTML='<div class="empty">Napaka: '+esc(res.error.message)+'</div>';return;}
    var rows=res.data||[];cache={};
    if(!rows.length){nujniList.innerHTML='<div class="empty">Ni nujnih rezervacij.</div>';return;}
    nujniList.innerHTML=rows.map(function(b){cache[b.id]=b;return ''
      +'<div class="card"><div class="body"><div class="svc">'+esc(b.services_text||b.service_name||'—')+'</div>'
      +'<div class="meta">'+esc(b.customer_name||'—')+(b.customer_phone?(' · <a href="tel:'+esc(b.customer_phone)+'">'+esc(b.customer_phone)+'</a>'):'')+(b.customer_email?('<br>'+esc(b.customer_email)):'')+'</div>'
      +(b.note?('<div class="meta" style="font-style:italic">'+esc(b.note)+'</div>'):'')+'</div>'
      +'<div class="side2"><div class="price">'+eur(b.total_price)+'</div>'+badge(b.status)+'<button class="act" data-open="'+b.id+'">Podrobnosti</button></div></div>';
    }).join('');
    nujniList.querySelectorAll('[data-open]').forEach(function(x){x.addEventListener('click',function(){openDetail(cache[x.getAttribute('data-open')]);});});
  });
}

/* STRANKE */
var CUSTOMERS=[];
function obiski(n){var d=n%10,dd=n%100;if(dd>=11&&dd<=14)return n+' obiskov';if(d===1)return n+' obisk';if(d===2)return n+' obiska';if(d===3||d===4)return n+' obiski';return n+' obiskov';}
function prettyShort(iso){if(!iso)return '';var p=iso.split('-');return (+p[2])+'. '+MES[+p[1]-1].substring(0,3)+' '+p[0];}
function buildCustomers(rows){
  var map={};
  rows.forEach(function(b){
    var ph=(b.customer_phone||'').replace(/\D/g,'');
    var key=ph||('n:'+(b.customer_name||'').toLowerCase().trim());
    if(!key||key==='n:')return;
    if(!map[key])map[key]={key:key,name:b.customer_name||'',phone:b.customer_phone||'',email:b.customer_email||'',bookings:[]};
    var c=map[key];
    if(b.customer_name)c.name=b.customer_name;
    if(b.customer_phone)c.phone=b.customer_phone;
    if(b.customer_email)c.email=b.customer_email;
    c.bookings.push(b);
  });
  var arr=Object.keys(map).map(function(k){return map[k];});
  arr.forEach(function(c){
    c.bookings.sort(function(a,b){return (b.booking_date||'').localeCompare(a.booking_date||'')||(b.start_time||'').localeCompare(a.start_time||'');});
    c.visits=c.bookings.length; c.last=c.bookings.length?c.bookings[0].booking_date:null;
  });
  arr.sort(function(a,b){return (b.last||'').localeCompare(a.last||'');});
  return arr;
}
function loadCustomersThen(cb){
  sb.from('bookings').select('id,customer_name,customer_phone,customer_email,booking_date,start_time,end_time,total_duration_min,services_text,service_name,total_price,status,note,gap_after_min,gap_duration_min').order('booking_date',{ascending:false,nullsFirst:false}).then(function(res){
    CUSTOMERS=res.error?[]:buildCustomers(res.data||[]);
    if(cb)cb();
  });
}
function loadStranke(){
  calScroll.classList.add('hidden');nujniList.classList.add('hidden');document.getElementById('strankeView').classList.remove('hidden');
  resetMiniHeight();
  document.getElementById('rangeLabel').textContent='Stranke';
  var box=document.getElementById('strankeView');
  box.innerHTML='<input class="search" id="custSearch" placeholder="Išči po imenu ali telefonu …"><div id="custList"><div class="empty">Nalagam …</div></div>';
  document.getElementById('custSearch').addEventListener('input',refreshStrankeList);
  loadCustomersThen(refreshStrankeList);
}
function refreshStrankeList(){
  var listEl=document.getElementById('custList'); if(!listEl)return;
  var q=(document.getElementById('custSearch').value||'').toLowerCase().trim(), qd=q.replace(/\D/g,'');
  if(!CUSTOMERS.length){listEl.innerHTML='<div class="empty">Ni strank.</div>';return;}
  var list=CUSTOMERS.filter(function(c){if(!q)return true;return (c.name||'').toLowerCase().indexOf(q)>=0||(qd&&(c.phone||'').replace(/\D/g,'').indexOf(qd)>=0);});
  if(!list.length){listEl.innerHTML='<div class="empty">Ni zadetkov.</div>';return;}
  var html='';
  list.slice(0,300).forEach(function(c,i){
    html+='<div class="cust"><div class="cust-head" data-ci="'+i+'"><div><div class="cust-name">'+esc(c.name||'—')+'</div><div class="cust-sub">'+esc(c.phone||'')+(c.email?(' · '+esc(c.email)):'')+'</div></div><div class="cust-meta">'+obiski(c.visits)+(c.last?('<br>zadnji: '+prettyShort(c.last)):'')+'</div></div><div class="cust-hist hidden"></div></div>';
  });
  listEl.innerHTML=html;
  listEl.querySelectorAll('.cust-head').forEach(function(hd){
    hd.addEventListener('click',function(){
      var c=list[+hd.getAttribute('data-ci')], hist=hd.nextElementSibling;
      if(!hist.classList.contains('hidden')){hist.classList.add('hidden');hist.innerHTML='';return;}
      var hh='';
      c.bookings.forEach(function(b){cache[b.id]=b;hh+='<div class="hist-row" data-id="'+b.id+'"><span class="h-date">'+(b.booking_date?(prettyShort(b.booking_date)+' '+hm(b.start_time)):'Po dogovoru')+'</span><span class="h-svc">'+esc(b.services_text||b.service_name||'')+'</span><span class="h-price">'+eur(b.total_price)+'</span>'+badge(b.status)+'</div>';});
      hist.innerHTML=hh; hist.classList.remove('hidden');
      hist.querySelectorAll('.hist-row').forEach(function(r){r.addEventListener('click',function(){openDetail(cache[r.getAttribute('data-id')]);});});
    });
  });
}
function populateCustDatalist(){
  var dl=document.getElementById('custNames'); if(!dl)return;
  var seen={},html='';
  CUSTOMERS.forEach(function(c){var n=c.name||''; if(n&&!seen[n.toLowerCase()]){seen[n.toLowerCase()]=1;html+='<option value="'+esc(n)+'">'+esc(c.phone||'')+'</option>';}});
  dl.innerHTML=html;
}
function fillFromCustomer(){
  var name=document.getElementById('nbName').value.trim().toLowerCase(); if(!name)return;
  var c=null;for(var i=0;i<CUSTOMERS.length;i++){if((CUSTOMERS[i].name||'').toLowerCase()===name){c=CUSTOMERS[i];break;}}
  if(!c)return;
  var ph=document.getElementById('nbPhone'), em=document.getElementById('nbEmail');
  if(!ph.value&&c.phone)ph.value=c.phone;
  if(!em.value&&c.email)em.value=c.email;
}

function badge(s){var m={'nova':'nova','potrjeno':'potrjeno','opravljeno':'opravljeno','preklicano':'preklicano','po dogovoru':'podogovoru'};return '<span class="badge '+(m[s]||'nova')+'">'+esc(s||'nova')+'</span>';}

function renderCal(days,bookings,blocks){
  cache={};blockCache={};var N=days.length;var gw=isMobile()?44:64;var gc=gw+'px repeat('+N+',1fr)';
  var h='<div class="cal '+(N>1?'multi':'')+'"><div class="cal-head" style="grid-template-columns:'+gc+'"><div></div>';
  days.forEach(function(d){var info=dayInfo(d.getDay());var hcls=info.closed?'off':(info.arrangement?'arr':'');h+='<div class="dayhead '+hcls+(isoOf(d)===isoToday()?' today':'')+'"><div class="dow">'+(N===1?DOWF:DOW)[(d.getDay()+6)%7]+'</div><div class="dnum">'+d.getDate()+'</div></div>';});
  h+='</div><div class="cal-body" style="grid-template-columns:'+gc+'"><div class="gutter" style="height:'+TOTAL+'px">';
  for(var hh=H0;hh<=H1;hh++){h+='<div class="hr" style="top:'+((hh-H0)*HOUR_PX)+'px">'+pad(hh)+':00</div>';}
  h+='</div>';
  days.forEach(function(d){
    var info=dayInfo(d.getDay()),di=isoOf(d),col='<div class="col" data-date="'+di+'" style="height:'+TOTAL+'px">';
    if(info.closed)col+='<div class="off-band closed" style="top:0;height:'+TOTAL+'px"></div>';
    else if(info.arrangement)col+='<div class="off-band arr" style="top:0;height:'+TOTAL+'px"></div>';
    else if(info.h){if(info.h[0]>H0)col+='<div class="off-band closed" style="top:0;height:'+((info.h[0]-H0)*HOUR_PX)+'px"></div>';if(info.h[1]<H1)col+='<div class="off-band closed" style="top:'+((info.h[1]-H0)*HOUR_PX)+'px;height:'+((H1-info.h[1])*HOUR_PX)+'px"></div>';}
    bookings.filter(function(b){return b.booking_date===di;}).forEach(function(b){
      cache[b.id]=b;var s=toMin(b.start_time),e=toMin(b.end_time)||(s+(b.total_duration_min||30));
      var top=(s-H0*60)*PXMIN,hgt=Math.max((e-s)*PXMIN,20);
      var cls=({'potrjeno':'potrjeno','opravljeno':'opravljeno','preklicano':'preklicano'})[b.status]||'';
      col+='<div class="ev '+cls+'" data-bid="'+b.id+'" style="top:'+top+'px;height:'+hgt+'px"><div class="ev-t">'+hm(b.start_time)+'–'+hm(b.end_time)+'</div><div class="ev-n">'+esc(b.customer_name||'—')+'</div><div class="ev-s">'+esc(b.services_text||b.service_name||'')+'</div></div>';
    });
    blocks.filter(function(bl){return bl.block_date===di;}).forEach(function(bl){
      blockCache[bl.id]=bl;
      var s=toMin(bl.start_time),e=toMin(bl.end_time),top=(s-H0*60)*PXMIN,hgt=Math.max((e-s)*PXMIN,18);
      col+='<div class="ev block" data-blk="'+bl.id+'" style="top:'+top+'px;height:'+hgt+'px"><div class="ev-t">'+hm(bl.start_time)+'–'+hm(bl.end_time)+'</div><div class="ev-n">Blokirano</div>'+(bl.note?('<div class="ev-s">'+esc(bl.note)+'</div>'):'')+'</div>';
    });
    col+='</div>';h+=col;
  });
  h+='</div></div>';calScroll.innerHTML=h;
  calScroll.querySelectorAll('.ev[data-bid]').forEach(function(el){
    var b=cache[el.getAttribute('data-bid')];
    el.addEventListener('click',function(){openDetail(b);});
    el.addEventListener('mouseenter',function(){showTip(tipBooking(b),el);});
    el.addEventListener('mouseleave',hideTip);
    el.addEventListener('touchstart',function(){showTip(tipBooking(b),el);},{passive:true});
  });
  calScroll.querySelectorAll('.ev[data-blk]').forEach(function(el){
    var bl=blockCache[el.getAttribute('data-blk')];
    el.addEventListener('mouseenter',function(){showTip(tipBlock(bl),el);});
    el.addEventListener('mouseleave',hideTip);
    el.addEventListener('touchstart',function(){showTip(tipBlock(bl),el);},{passive:true});
    el.addEventListener('click',function(){hideTip();if(confirm('Odstranim to blokado?'))sb.from('blocks').delete().eq('id',el.getAttribute('data-blk')).then(function(res){if(res.error)alert('Napaka: '+res.error.message);load();});});
  });
  calScroll.querySelectorAll('.col').forEach(function(colEl){
    colEl.addEventListener('dblclick',function(e){
      if(e.target.closest('.ev'))return;
      var rect=colEl.getBoundingClientRect();
      var mins=H0*60 + (e.clientY-rect.top)/PXMIN;
      mins=Math.round(mins/15)*15;
      if(mins<H0*60)mins=H0*60; if(mins>H1*60)mins=H1*60;
      openNewAt(colEl.getAttribute('data-date'), pad(Math.floor(mins/60))+':'+pad(mins%60));
    });
  });
  syncMiniHeight();
}

function renderMonth(cells,counts){
  var h='<div class="month"><div class="mhead">';
  DOW.forEach(function(d){h+='<div>'+d+'</div>';});
  h+='</div><div class="mgrid">';
  cells.forEach(function(d){
    var iso=isoOf(d),out=d.getMonth()!==cur.getMonth(),c=counts[iso]||0,off=(d.getDay()===0);
    h+='<button class="mcell'+(out?' out':'')+(iso===isoToday()?' today':'')+(off?' off':'')+'" data-d="'+iso+'"><span class="mnum">'+d.getDate()+'</span>'+(c?'<span class="mcount">'+c+'</span>':'')+'</button>';
  });
  h+='</div></div>';calScroll.innerHTML=h;
  calScroll.querySelectorAll('.mcell').forEach(function(b){b.addEventListener('click',function(){var p=b.getAttribute('data-d').split('-');cur=new Date(+p[0],+p[1]-1,+p[2]);miniRef=new Date(cur);mode='day';setSeg('day');load();});});
  syncMiniHeight();
}

/* PREDOGLED (hover/dotik) */
var tip=document.getElementById('tip');
function tipBooking(b){
  if(!b)return '';
  var gap=(b.gap_duration_min>0)?'<div class="tip-row">⏳ vmesni prosti čas '+b.gap_after_min+'+'+b.gap_duration_min+' min</div>':'';
  return '<div class="tip-t">'+hm(b.start_time)+'–'+hm(b.end_time)+'</div>'
    +'<div class="tip-n">'+esc(b.customer_name||'—')+'</div>'
    +(b.customer_phone?'<div class="tip-row">📞 '+esc(b.customer_phone)+'</div>':'')
    +'<div class="tip-row">'+esc(b.services_text||b.service_name||'')+'</div>'
    +(b.note?'<div class="tip-row" style="font-style:italic">'+esc(b.note)+'</div>':'')+gap
    +'<div class="tip-foot"><span class="tip-price">'+eur(b.total_price)+'</span>'+badge(b.status)+'</div>';
}
function tipBlock(bl){
  if(!bl)return '';
  return '<div class="tip-t">'+hm(bl.start_time)+'–'+hm(bl.end_time)+'</div><div class="tip-n" style="color:var(--coral)">⛔ Blokirano</div>'+(bl.note?'<div class="tip-row">'+esc(bl.note)+'</div>':'');
}
function showTip(html,el){
  if(!html)return;
  tip.innerHTML=html;tip.classList.remove('hidden');
  var r=el.getBoundingClientRect(),tw=tip.offsetWidth,th=tip.offsetHeight,M=8;
  var left=r.right+M; if(left+tw>window.innerWidth-M) left=r.left-tw-M; if(left<M) left=M;
  var top=r.top; if(top+th>window.innerHeight-M) top=window.innerHeight-th-M; if(top<M) top=M;
  tip.style.left=left+'px';tip.style.top=top+'px';
}
function hideTip(){tip.classList.add('hidden');}
window.addEventListener('scroll',hideTip,true);
window.addEventListener('touchmove',hideTip);

/* PODROBNOSTI */
var detail=document.getElementById('detail'),detailBody=document.getElementById('detailBody');
document.getElementById('detailClose').addEventListener('click',function(){detail.classList.add('hidden');});
detail.addEventListener('click',function(e){if(e.target===detail)detail.classList.add('hidden');});
function openDetail(b){
  if(!b)return;
  hideTip();
  var gap=(b.gap_duration_min>0)?('<div class="d-meta">⏳ vmesni prosti čas: '+b.gap_after_min+'+'+b.gap_duration_min+' min</div>'):'';
  detailBody.innerHTML=''
    +'<div class="d-date">'+(b.booking_date?prettyDate(b.booking_date):'Po dogovoru / nujni')+'</div>'
    +'<div class="d-time">'+(b.booking_date?(hm(b.start_time)+'–'+hm(b.end_time)+' · '+(b.total_duration_min||0)+' min'):'')+'</div>'
    +'<div class="d-svc">'+esc(b.services_text||b.service_name||'—')+'</div>'
    +'<div class="d-meta">👤 '+esc(b.customer_name||'—')+(b.customer_phone?('<br>📞 <a href="tel:'+esc(b.customer_phone)+'">'+esc(b.customer_phone)+'</a>'):'')+(b.customer_email?('<br>✉️ '+esc(b.customer_email)):'')+'</div>'
    +(b.note?('<div class="d-note">'+esc(b.note)+'</div>'):'')+gap
    +'<div class="d-row"><span class="price">'+eur(b.total_price)+'</span>'+badge(b.status)+'</div>'
    +'<div class="d-actions"><button class="act" data-id="'+b.id+'" data-s="potrjeno">Potrdi</button><button class="act" data-id="'+b.id+'" data-s="opravljeno">Opravljeno</button><button class="act danger" data-id="'+b.id+'" data-s="preklicano">Prekliči</button></div>';
  detailBody.querySelectorAll('.act').forEach(function(btn){btn.addEventListener('click',function(){
    var id=btn.getAttribute('data-id'),s=btn.getAttribute('data-s');
    if(s==='preklicano'&&!confirm('Prekličem to rezervacijo?'))return;
    btn.textContent='…';
    sb.from('bookings').update({status:s}).eq('id',id).then(function(res){if(res.error)alert('Napaka: '+res.error.message);detail.classList.add('hidden');load();});
  });});
  detail.classList.remove('hidden');
}

/* NOVA REZERVACIJA */
function loadServices(){
  sb.from('services').select('id,name,price,category,sort_order,duration_min,gap_after_min,gap_duration_min').eq('active',true).order('sort_order',{ascending:true}).then(function(res){
    if(!res.error)SERVICES=res.data||[];
  });
}
function buildNbServices(){
  var box=document.getElementById('nbServices');
  if(!SERVICES.length){box.innerHTML='<div style="opacity:.6;padding:.4rem 0">Nalagam storitve …</div>';return;}
  var cats=[],byCat={};
  SERVICES.forEach(function(s){if(!byCat[s.category]){byCat[s.category]=[];cats.push(s.category);}byCat[s.category].push(s);});
  var html='';
  cats.forEach(function(c){
    html+='<div class="nb-cat">'+esc(c)+'</div>';
    byCat[c].forEach(function(s){
      html+='<label class="nb-item"><input type="checkbox" value="'+s.id+'"><span>'+esc(s.name)+'</span><span class="nb-dur">'+(s.duration_min||0)+' min</span><span class="nb-price">'+eur(s.price)+'</span></label>';
    });
  });
  box.innerHTML=html;
  box.querySelectorAll('input[type=checkbox]').forEach(function(cb){cb.addEventListener('change',updateNbSummary);});
}
function nbSelected(){
  var ids=[];document.querySelectorAll('#nbServices input:checked').forEach(function(cb){ids.push(cb.value);});
  return SERVICES.filter(function(s){return ids.indexOf(String(s.id))>=0;});
}
function updateNbSummary(){
  var sel=nbSelected(),sumEl=document.getElementById('nbSummary');
  if(!sel.length){sumEl.textContent='Izberi vsaj eno storitev.';return;}
  var dur=sel.reduce(function(a,s){return a+(parseInt(s.duration_min)||0);},0);
  var price=sel.reduce(function(a,s){return a+(parseFloat(s.price)||0);},0);
  var start=document.getElementById('nbTime').value,endTxt='';
  if(start&&dur){var sm=toMin(start)+dur;endTxt=pad(Math.floor(sm/60))+':'+pad(sm%60);}
  sumEl.innerHTML='Skupaj: <strong>'+dur+' min</strong> · <strong>'+eur(price)+'</strong>'+(endTxt?(' · konec ob <strong>'+endTxt+'</strong>'):'');
}
function openNew(){
  document.getElementById('nbDate').value=isoOf(cur);
  ['nbTime','nbName','nbPhone','nbEmail','nbNote'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('nbMsg').textContent='';document.getElementById('nbMsg').className='msg';
  buildNbServices();
  document.getElementById('nbSummary').textContent='Izberi vsaj eno storitev.';
  document.getElementById('newbk').classList.remove('hidden');
  loadCustomersThen(populateCustDatalist);
}
function openNewAt(dateISO,timeStr){
  openNew();
  if(dateISO)document.getElementById('nbDate').value=dateISO;
  if(timeStr){document.getElementById('nbTime').value=timeStr;updateNbSummary();}
}
function saveNew(){
  var sel=nbSelected(),msg=document.getElementById('nbMsg');msg.className='msg';
  var date=document.getElementById('nbDate').value,start=document.getElementById('nbTime').value;
  var name=document.getElementById('nbName').value.trim(),phone=document.getElementById('nbPhone').value.trim();
  var email=document.getElementById('nbEmail').value.trim(),note=document.getElementById('nbNote').value.trim();
  if(!sel.length){msg.textContent='Izberi vsaj eno storitev.';msg.className='msg err';return;}
  if(!date||!start){msg.textContent='Vnesi datum in uro začetka.';msg.className='msg err';return;}
  if(!name){msg.textContent='Vnesi ime stranke.';msg.className='msg err';return;}
  var dur=sel.reduce(function(a,s){return a+(parseInt(s.duration_min)||0);},0);
  var price=sel.reduce(function(a,s){return a+(parseFloat(s.price)||0);},0);
  var em=toMin(start)+dur,end=pad(Math.floor(em/60))+':'+pad(em%60);
  var gapAfter=0,gapDuration=0,gapSvc=null;
  sel.forEach(function(s){var gd=parseInt(s.gap_duration_min)||0,ga=parseInt(s.gap_after_min)||0;if(gd>0&&ga>0){if(!gapSvc||gd>(parseInt(gapSvc.gap_duration_min)||0))gapSvc=s;}});
  if(gapSvc){var ga=parseInt(gapSvc.gap_after_min)||0,gd=parseInt(gapSvc.gap_duration_min)||0;if(ga+gd<=dur){gapAfter=ga;gapDuration=gd;}}
  var rec={service_id:sel[0].id,service_name:sel[0].name,services_text:sel.map(function(s){return s.name;}).join(' + '),
    total_price:parseFloat(price.toFixed(2)),total_duration_min:dur,gap_after_min:gapAfter,gap_duration_min:gapDuration,
    customer_name:name,customer_phone:phone||null,customer_email:email||null,
    booking_date:date,start_time:start,end_time:end,status:'potrjeno',note:note||null};
  var btn=document.getElementById('nbSave');btn.disabled=true;btn.textContent='Shranjujem …';
  sb.from('bookings').insert([rec]).then(function(res){
    btn.disabled=false;btn.textContent='Shrani rezervacijo';
    if(res.error){msg.textContent='Napaka: '+res.error.message;msg.className='msg err';return;}
    document.getElementById('newbk').classList.add('hidden');
    var p=date.split('-');cur=new Date(+p[0],+p[1]-1,+p[2]);miniRef=new Date(cur);mode='day';setSeg('day');load();
  });
}
document.getElementById('newBtn').addEventListener('click',openNew);
document.getElementById('newClose').addEventListener('click',function(){document.getElementById('newbk').classList.add('hidden');});
document.getElementById('nbCancel').addEventListener('click',function(){document.getElementById('newbk').classList.add('hidden');});
document.getElementById('newbk').addEventListener('click',function(e){if(e.target.id==='newbk')document.getElementById('newbk').classList.add('hidden');});
document.getElementById('nbTime').addEventListener('change',updateNbSummary);
document.getElementById('nbName').addEventListener('change',fillFromCustomer);
document.getElementById('nbSave').addEventListener('click',saveNew);

sb.auth.getSession().then(function(res){if(res.data&&res.data.session)showApp(res.data.session);else showLogin();});
</script>
