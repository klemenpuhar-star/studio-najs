<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Najs · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--bez:#EAD7C1;--bez2:#f5ebe0;--navy:#17394B;--coral:#CE7E6F;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bez2);color:var(--navy);min-height:100vh}
.hidden{display:none!important}
a{color:inherit}

/* Prijava */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-card{background:#fff;border-radius:18px;box-shadow:0 10px 40px rgba(23,57,75,.12);padding:2.4rem 2rem;width:100%;max-width:380px;text-align:center}
.login-card h1{font-family:var(--serif);font-weight:300;font-size:1.9rem}
.login-card .sub{font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;color:var(--coral);margin-bottom:1.6rem}
.field{text-align:left;margin-bottom:1rem}
.field label{display:block;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;opacity:.6;margin-bottom:.35rem}
.field input{width:100%;padding:.7rem .8rem;border:1.5px solid rgba(23,57,75,.15);border-radius:10px;font-family:var(--sans);font-size:.95rem;color:var(--navy)}
.field input:focus{outline:none;border-color:var(--coral)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;border:none;border-radius:999px;cursor:pointer;font-family:var(--sans);transition:.2s}
.btn-main{background:var(--coral);color:#fff;padding:.75rem 1.4rem;font-size:.85rem;width:100%}
.btn-main:hover{filter:brightness(.95)}
.btn-main:disabled{opacity:.6}
.msg{font-size:.82rem;margin-top:.9rem;min-height:1em}
.msg.err{color:#b04a3a}

/* Glava */
header{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:0 4%;height:60px;background:rgba(234,215,193,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(23,57,75,.1)}
header .brand{font-family:var(--serif);font-size:1.35rem;font-weight:300}
header .brand span{color:var(--coral)}
header .right{display:flex;align-items:center;gap:.9rem}
header .who{font-size:.74rem;opacity:.65}
.btn-ghost{background:#fff;border:1.5px solid rgba(23,57,75,.2);color:var(--navy);padding:.45rem .9rem;font-size:.74rem;border-radius:999px;cursor:pointer}
.btn-ghost:hover{border-color:var(--coral);color:var(--coral)}

/* Orodna vrstica */
.toolbar{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;padding:1rem 4% .4rem}
.nav-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(23,57,75,.15);background:#fff;cursor:pointer;font-size:1rem;color:var(--navy)}
.nav-btn:hover{border-color:var(--coral);color:var(--coral)}
.range{font-family:var(--serif);font-size:1.25rem;margin:0 .4rem;min-width:170px}
.seg{display:flex;border:1.5px solid rgba(23,57,75,.15);border-radius:999px;overflow:hidden;background:#fff;margin-left:auto}
.seg button{border:none;background:transparent;padding:.45rem .95rem;font-size:.78rem;cursor:pointer;color:var(--navy);font-family:var(--sans)}
.seg button.active{background:var(--navy);color:#fff}

.wrap{padding:.4rem 4% 3rem}

/* Koledar */
.cal-scroll{overflow-x:auto;background:#fff;border-radius:14px;box-shadow:0 2px 16px rgba(23,57,75,.08);padding:0}
.cal{min-width:100%}
.cal.week{min-width:760px}
.cal-head{display:grid;position:sticky;top:0;background:#fff;z-index:5;border-bottom:1px solid #eceae6}
.cal-body{display:grid}
.gutter-cell,.gutter{}
.dayhead{padding:.6rem .3rem;text-align:center;border-left:1px solid #f0eee9}
.dayhead .dow{font-size:.66rem;letter-spacing:.1em;opacity:.55;text-transform:uppercase}
.dayhead .dnum{font-family:var(--serif);font-size:1.3rem;line-height:1}
.dayhead.today .dnum{color:var(--coral)}
.dayhead.off{background:repeating-linear-gradient(45deg,#fafafa,#fafafa 6px,#f2f2f2 6px,#f2f2f2 12px)}
.gutter{position:relative;height:624px}
.gutter .hr{position:absolute;right:6px;font-size:.64rem;opacity:.5;transform:translateY(-50%)}
.col{position:relative;height:624px;border-left:1px solid #f0eee9;background:repeating-linear-gradient(to bottom,transparent,transparent 51px,#f0f1f1 51px,#f0f1f1 52px)}
.col.off{background:repeating-linear-gradient(to bottom,transparent,transparent 51px,#f0f1f1 51px,#f0f1f1 52px),repeating-linear-gradient(45deg,#fafafa,#fafafa 6px,#f4f4f4 6px,#f4f4f4 12px)}
.ev{position:absolute;left:3px;right:3px;border-radius:7px;padding:3px 6px;font-size:.7rem;line-height:1.2;cursor:pointer;overflow:hidden;border-left:3px solid var(--coral);background:#f3eee7;color:var(--navy)}
.ev:hover{filter:brightness(.97);box-shadow:0 2px 8px rgba(23,57,75,.15)}
.ev .ev-t{font-size:.62rem;opacity:.7}
.ev .ev-n{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev .ev-s{opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev.nova{background:#f3eee7;border-left-color:var(--coral)}
.ev.potrjeno{background:#e6f0e9;border-left-color:#3f8f5b}
.ev.opravljeno{background:#e4e9ec;border-left-color:var(--navy);opacity:.85}
.ev.preklicano{background:#f2e3e0;border-left-color:#b04a3a;opacity:.5;text-decoration:line-through}
.ev.block{background:repeating-linear-gradient(45deg,#fff,#fff 7px,rgba(206,126,111,.14) 7px,rgba(206,126,111,.14) 14px);border-left:3px dashed var(--coral);color:var(--coral)}

/* Nujni seznam */
.cards{display:flex;flex-direction:column;gap:.8rem;max-width:760px}
.empty{text-align:center;opacity:.55;padding:2.5rem 0;font-style:italic}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 14px rgba(23,57,75,.07);padding:1rem 1.1rem;display:flex;gap:1rem;align-items:flex-start;flex-wrap:wrap}
.card .body{flex:1;min-width:200px}
.card .svc{font-weight:500;margin-bottom:.25rem}
.card .meta{font-size:.82rem;opacity:.8;line-height:1.5}
.card .meta a{color:var(--coral);text-decoration:none}
.card .side{display:flex;flex-direction:column;align-items:flex-end;gap:.5rem}
.price{font-family:var(--serif);font-size:1.2rem;font-weight:600}

/* Značke + akcije */
.badge{font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;padding:.2rem .6rem;border-radius:999px;display:inline-block}
.badge.nova{background:rgba(23,57,75,.1);color:var(--navy)}
.badge.potrjeno{background:rgba(70,140,90,.16);color:#2f6b43}
.badge.opravljeno{background:rgba(23,57,75,.85);color:#fff}
.badge.preklicano{background:rgba(176,74,58,.15);color:#b04a3a}
.badge.podogovoru{background:rgba(206,126,111,.18);color:var(--coral)}
.actions{display:flex;gap:.35rem;flex-wrap:wrap}
.act{font-size:.72rem;padding:.4rem .7rem;border-radius:999px;border:1.5px solid rgba(23,57,75,.18);background:#fff;cursor:pointer;color:var(--navy)}
.act:hover{border-color:var(--coral);color:var(--coral)}
.act.danger:hover{border-color:#b04a3a;color:#b04a3a}

/* Overlay / popup */
.overlay{position:fixed;inset:0;z-index:50;background:rgba(23,57,75,.4);display:flex;align-items:center;justify-content:center;padding:1.2rem}
.pop{background:#fff;border-radius:16px;box-shadow:0 18px 50px rgba(23,57,75,.25);width:100%;max-width:420px;padding:1.5rem;position:relative}
.pop .x{position:absolute;top:.7rem;right:.9rem;border:none;background:transparent;font-size:1.4rem;cursor:pointer;color:var(--navy);line-height:1}
.pop .d-date{font-size:.78rem;opacity:.6}
.pop .d-time{font-family:var(--serif);font-size:1.5rem;font-weight:600;margin:.1rem 0 .5rem}
.pop .d-svc{font-weight:500;margin-bottom:.5rem}
.pop .d-meta{font-size:.86rem;opacity:.85;line-height:1.6;margin-bottom:.6rem}
.pop .d-meta a{color:var(--coral);text-decoration:none}
.pop .d-note{font-size:.84rem;font-style:italic;opacity:.75;border-left:2px solid var(--coral);padding-left:.5rem;margin-bottom:.6rem}
.pop .d-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.pop .d-actions{display:flex;gap:.4rem;flex-wrap:wrap}

/* Blokada obrazec */
.block-form{background:#fff;border-radius:14px;box-shadow:0 2px 14px rgba(23,57,75,.07);padding:1.1rem;margin:.6rem 0 1rem;max-width:560px}
.block-form .bf-row{display:flex;gap:1rem;flex-wrap:wrap}
.block-form label{display:block;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;opacity:.65;margin-bottom:.9rem}
.block-form input{display:block;margin-top:.3rem;padding:.55rem .7rem;border:1.5px solid rgba(23,57,75,.15);border-radius:10px;font-family:var(--sans);color:var(--navy)}
.block-form input[type=text]{width:100%}
.block-form .bf-actions{display:flex;gap:.6rem;align-items:center}

@media(max-width:700px){
  .range{min-width:120px;font-size:1.1rem}
  .toolbar{gap:.4rem}
}
</style>
</head>
<body>

<!-- PRIJAVA -->
<div class="login-wrap" id="loginView">
  <div class="login-card">
    <h1>Najs <span style="color:var(--coral)">&#10022;</span></h1>
    <p class="sub">Administracija</p>
    <div class="field"><label>E-pošta</label><input type="email" id="email" autocomplete="username" placeholder="vasa@posta.si" /></div>
    <div class="field"><label>Geslo</label><input type="password" id="password" autocomplete="current-password" placeholder="********" /></div>
    <button class="btn btn-main" id="loginBtn">Prijava</button>
    <p class="msg" id="loginMsg"></p>
  </div>
</div>

<!-- ADMIN -->
<div id="appView" class="hidden">
  <header>
    <div class="brand">Najs <span>&#10022;</span> admin</div>
    <div class="right"><span class="who" id="whoLabel"></span><button class="btn-ghost" id="logoutBtn">Odjava</button></div>
  </header>

  <div class="toolbar">
    <button class="btn-ghost" id="todayBtn">Danes</button>
    <button class="nav-btn" id="prevBtn">&#8249;</button>
    <button class="nav-btn" id="nextBtn">&#8250;</button>
    <span class="range" id="rangeLabel"></span>
    <button class="btn-ghost" id="blockToggle">&#9210; Blokiraj čas</button>
    <div class="seg">
      <button data-mode="day" id="segDay">Dan</button>
      <button data-mode="week" id="segWeek" class="active">Teden</button>
      <button data-mode="nujni" id="segNujni">Nujni</button>
    </div>
  </div>

  <div class="wrap">
    <div class="block-form hidden" id="blockForm">
      <div class="bf-row">
        <label>Datum<input type="date" id="blkDate"></label>
        <label>Od<input type="time" id="blkFrom" step="900"></label>
        <label>Do<input type="time" id="blkTo" step="900"></label>
      </div>
      <label>Opomba (neobvezno)<input type="text" id="blkNote" placeholder="npr. malica, dopust"></label>
      <div class="bf-actions">
        <button class="btn btn-main" id="blkSave" style="width:auto;padding:.55rem 1.3rem">Shrani blokado</button>
        <button class="btn-ghost" id="blkCancel">Prekliči</button>
      </div>
      <p class="msg" id="blkMsg"></p>
    </div>

    <div class="cal-scroll" id="calScroll"></div>
    <div class="cards hidden" id="nujniList"></div>
  </div>
</div>

<!-- Podrobnosti -->
<div class="overlay hidden" id="detail">
  <div class="pop">
    <button class="x" id="detailClose">&times;</button>
    <div id="detailBody"></div>
  </div>
</div>

<script>
var SB_URL='https://azqtgvxashunmmydkwop.supabase.co';
var SB_KEY='sb_publishable_Sjlg-Y5ve3QRSQY-6usn6g_tB6Tgdsg';
var sb=supabase.createClient(SB_URL,SB_KEY);

var loginView=document.getElementById('loginView');
var appView=document.getElementById('appView');
var calScroll=document.getElementById('calScroll');
var nujniList=document.getElementById('nujniList');

var H0=8,H1=20,HOUR_PX=52,PXMIN=HOUR_PX/60,TOTAL=(H1-H0)*HOUR_PX;
var DOW=['PON','TOR','SRE','ČET','PET','SOB','NED'];
var DNI=['nedelja','ponedeljek','torek','sreda','četrtek','petek','sobota'];
var MES=['januar','februar','marec','april','maj','junij','julij','avgust','september','oktober','november','december'];
var WORK_OFF=[6]; // nedelja = neaktivna (samo zatemnitev)
var mode='week', cur=new Date(); cur.setHours(0,0,0,0);
var cache={}; // id -> booking

function pad(n){return String(n).padStart(2,'0');}
function isoOf(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function isoToday(){return isoOf(new Date());}
function mondayOf(d){var x=new Date(d);var k=(x.getDay()+6)%7;x.setDate(x.getDate()-k);x.setHours(0,0,0,0);return x;}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function toMin(t){t=String(t||'').substring(0,5);var p=t.split(':');return (parseInt(p[0])||0)*60+(parseInt(p[1])||0);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function eur(v){return (parseFloat(v)||0).toFixed(2).replace('.',',')+' €';}
function prettyDate(iso){if(!iso)return '';var p=iso.split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);return DNI[d.getDay()]+', '+(+p[2])+'. '+MES[+p[1]-1]+' '+p[0];}
function hm(t){return String(t||'').substring(0,5);}

/* AUTH */
function showApp(s){loginView.classList.add('hidden');appView.classList.remove('hidden');document.getElementById('whoLabel').textContent=s.user.email;load();}
function showLogin(){appView.classList.add('hidden');loginView.classList.remove('hidden');}
document.getElementById('loginBtn').addEventListener('click',doLogin);
document.getElementById('password').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
function doLogin(){
  var btn=document.getElementById('loginBtn'),msg=document.getElementById('loginMsg');
  var email=document.getElementById('email').value.trim(),pass=document.getElementById('password').value;
  msg.textContent='';msg.className='msg';
  if(!email||!pass){msg.textContent='Vnesi e-pošto in geslo.';msg.className='msg err';return;}
  btn.disabled=true;btn.textContent='Prijavljam …';
  sb.auth.signInWithPassword({email:email,password:pass}).then(function(res){
    btn.disabled=false;btn.textContent='Prijava';
    if(res.error){msg.textContent='Napačna e-pošta ali geslo.';msg.className='msg err';return;}
    showApp(res.data.session);
  });
}
document.getElementById('logoutBtn').addEventListener('click',function(){sb.auth.signOut().then(showLogin);});

/* NAVIGACIJA */
document.querySelectorAll('.seg button').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.seg button').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');mode=b.getAttribute('data-mode');load();
  });
});
document.getElementById('todayBtn').addEventListener('click',function(){cur=new Date();cur.setHours(0,0,0,0);load();});
document.getElementById('prevBtn').addEventListener('click',function(){cur=addDays(cur,mode==='day'?-1:-7);load();});
document.getElementById('nextBtn').addEventListener('click',function(){cur=addDays(cur,mode==='day'?1:7);load();});

/* BLOKADE */
var blockForm=document.getElementById('blockForm');
document.getElementById('blockToggle').addEventListener('click',function(){
  blockForm.classList.toggle('hidden');
  if(!blockForm.classList.contains('hidden')) document.getElementById('blkDate').value=isoOf(cur);
});
document.getElementById('blkCancel').addEventListener('click',function(){blockForm.classList.add('hidden');document.getElementById('blkMsg').textContent='';});
document.getElementById('blkSave').addEventListener('click',function(){
  var date=document.getElementById('blkDate').value,from=document.getElementById('blkFrom').value,to=document.getElementById('blkTo').value,note=document.getElementById('blkNote').value.trim();
  var msg=document.getElementById('blkMsg');msg.className='msg';
  if(!date||!from||!to){msg.textContent='Vnesi datum, začetek in konec.';msg.className='msg err';return;}
  if(to<=from){msg.textContent='Konec mora biti za začetkom.';msg.className='msg err';return;}
  var btn=document.getElementById('blkSave');btn.disabled=true;btn.textContent='Shranjujem …';
  sb.from('blocks').insert([{block_date:date,start_time:from,end_time:to,note:note||null}]).then(function(res){
    btn.disabled=false;btn.textContent='Shrani blokado';
    if(res.error){msg.textContent='Napaka: '+res.error.message;msg.className='msg err';return;}
    document.getElementById('blkFrom').value='';document.getElementById('blkTo').value='';document.getElementById('blkNote').value='';
    blockForm.classList.add('hidden');load();
  });
});

/* NALAGANJE */
function rangeText(days){
  if(mode==='day'){var d=days[0];return DNI[d.getDay()].charAt(0).toUpperCase()+DNI[d.getDay()].slice(1)+', '+d.getDate()+'. '+MES[d.getMonth()]+' '+d.getFullYear();}
  var a=days[0],b=days[6];return a.getDate()+'. '+MES[a.getMonth()].substring(0,3)+' – '+b.getDate()+'. '+MES[b.getMonth()].substring(0,3)+' '+b.getFullYear();
}
function load(){
  if(mode==='nujni'){loadNujni();return;}
  calScroll.classList.remove('hidden');nujniList.classList.add('hidden');
  var days=(mode==='week')?[0,1,2,3,4,5,6].map(function(i){return addDays(mondayOf(cur),i);}):[new Date(cur)];
  document.getElementById('rangeLabel').textContent=rangeText(days);
  var fromISO=isoOf(days[0]),toISO=isoOf(days[days.length-1]);
  calScroll.innerHTML='<div class="empty">Nalagam …</div>';
  Promise.all([
    sb.from('bookings').select('*').gte('booking_date',fromISO).lte('booking_date',toISO),
    sb.from('blocks').select('*').gte('block_date',fromISO).lte('block_date',toISO)
  ]).then(function(r){
    if(r[0].error){calScroll.innerHTML='<div class="empty">Napaka: '+esc(r[0].error.message)+'<br><small>Preveri pravice (RLS).</small></div>';return;}
    renderCal(days, r[0].data||[], (r[1]&&!r[1].error)?(r[1].data||[]):[]);
  });
}
function loadNujni(){
  calScroll.classList.add('hidden');nujniList.classList.remove('hidden');
  document.getElementById('rangeLabel').textContent='Nujni / po dogovoru';
  nujniList.innerHTML='<div class="empty">Nalagam …</div>';
  sb.from('bookings').select('*').is('booking_date',null).order('id',{ascending:false}).then(function(res){
    if(res.error){nujniList.innerHTML='<div class="empty">Napaka: '+esc(res.error.message)+'</div>';return;}
    var rows=res.data||[];
    if(!rows.length){nujniList.innerHTML='<div class="empty">Ni nujnih rezervacij.</div>';return;}
    cache={};
    nujniList.innerHTML=rows.map(function(b){cache[b.id]=b;return ''
      +'<div class="card">'
      +'<div class="body"><div class="svc">'+esc(b.services_text||b.service_name||'—')+'</div>'
      +'<div class="meta">'+esc(b.customer_name||'—')+(b.customer_phone?(' · <a href="tel:'+esc(b.customer_phone)+'">'+esc(b.customer_phone)+'</a>'):'')+(b.customer_email?('<br>'+esc(b.customer_email)):'')+'</div>'
      +(b.note?('<div class="meta" style="font-style:italic">'+esc(b.note)+'</div>'):'')+'</div>'
      +'<div class="side"><div class="price">'+eur(b.total_price)+'</div>'+badge(b.status)
      +'<button class="act" data-open="'+b.id+'">Podrobnosti</button></div></div>';
    }).join('');
    nujniList.querySelectorAll('[data-open]').forEach(function(x){x.addEventListener('click',function(){openDetail(cache[x.getAttribute('data-open')]);});});
  });
}

function badge(s){var m={'nova':'nova','potrjeno':'potrjeno','opravljeno':'opravljeno','preklicano':'preklicano','po dogovoru':'podogovoru'};return '<span class="badge '+(m[s]||'nova')+'">'+esc(s||'nova')+'</span>';}

function renderCal(days, bookings, blocks){
  cache={};
  var N=days.length;
  var gridCols='64px repeat('+N+',1fr)';
  // glava
  var head='<div class="cal '+(mode==='week'?'week':'')+'">';
  head+='<div class="cal-head" style="grid-template-columns:'+gridCols+'">';
  head+='<div></div>';
  days.forEach(function(d){
    var off=WORK_OFF.indexOf(d.getDay())>=0;
    var isT=isoOf(d)===isoToday();
    head+='<div class="dayhead'+(off?' off':'')+(isT?' today':'')+'"><div class="dow">'+DOW[(d.getDay()+6)%7]+'</div><div class="dnum">'+d.getDate()+'</div></div>';
  });
  head+='</div>';
  // telo
  head+='<div class="cal-body" style="grid-template-columns:'+gridCols+'">';
  var g='<div class="gutter">';
  for(var h=H0;h<=H1;h++){ g+='<div class="hr" style="top:'+((h-H0)*HOUR_PX)+'px">'+pad(h)+':00</div>'; }
  g+='</div>';
  head+=g;
  days.forEach(function(d){
    var off=WORK_OFF.indexOf(d.getDay())>=0;
    var di=isoOf(d);
    var col='<div class="col'+(off?' off':'')+'">';
    bookings.filter(function(b){return b.booking_date===di;}).forEach(function(b){
      cache[b.id]=b;
      var s=toMin(b.start_time), e=toMin(b.end_time)||(s+(b.total_duration_min||30));
      var top=(s-H0*60)*PXMIN, hgt=Math.max((e-s)*PXMIN,20);
      var cls=({'nova':'nova','potrjeno':'potrjeno','opravljeno':'opravljeno','preklicano':'preklicano'})[b.status]||'nova';
      col+='<div class="ev '+cls+'" data-bid="'+b.id+'" style="top:'+top+'px;height:'+hgt+'px">'
        +'<div class="ev-t">'+hm(b.start_time)+'–'+hm(b.end_time)+'</div>'
        +'<div class="ev-n">'+esc(b.customer_name||'—')+'</div>'
        +'<div class="ev-s">'+esc(b.services_text||b.service_name||'')+'</div></div>';
    });
    blocks.filter(function(bl){return bl.block_date===di;}).forEach(function(bl){
      var s=toMin(bl.start_time), e=toMin(bl.end_time);
      var top=(s-H0*60)*PXMIN, hgt=Math.max((e-s)*PXMIN,18);
      col+='<div class="ev block" data-blk="'+bl.id+'" style="top:'+top+'px;height:'+hgt+'px">'
        +'<div class="ev-t">'+hm(bl.start_time)+'–'+hm(bl.end_time)+'</div>'
        +'<div class="ev-n">Blokirano</div>'+(bl.note?('<div class="ev-s">'+esc(bl.note)+'</div>'):'')+'</div>';
    });
    col+='</div>';
    head+=col;
  });
  head+='</div></div>';
  calScroll.innerHTML=head;

  calScroll.querySelectorAll('.ev[data-bid]').forEach(function(el){el.addEventListener('click',function(){openDetail(cache[el.getAttribute('data-bid')]);});});
  calScroll.querySelectorAll('.ev[data-blk]').forEach(function(el){el.addEventListener('click',function(){
    if(confirm('Odstranim to blokado?')){sb.from('blocks').delete().eq('id',el.getAttribute('data-blk')).then(function(res){if(res.error)alert('Napaka: '+res.error.message);load();});}
  });});
}

/* PODROBNOSTI */
var detail=document.getElementById('detail'),detailBody=document.getElementById('detailBody');
document.getElementById('detailClose').addEventListener('click',function(){detail.classList.add('hidden');});
detail.addEventListener('click',function(e){if(e.target===detail)detail.classList.add('hidden');});
function openDetail(b){
  if(!b)return;
  var gap=(b.gap_duration_min>0)?('<div class="d-meta">⏳ vmesni prosti čas: '+b.gap_after_min+'+'+b.gap_duration_min+' min</div>'):'';
  detailBody.innerHTML=''
    +'<div class="d-date">'+(b.booking_date?prettyDate(b.booking_date):'Po dogovoru / nujni')+'</div>'
    +'<div class="d-time">'+(b.booking_date?(hm(b.start_time)+'–'+hm(b.end_time)+' · '+(b.total_duration_min||0)+' min'):'')+'</div>'
    +'<div class="d-svc">'+esc(b.services_text||b.service_name||'—')+'</div>'
    +'<div class="d-meta">👤 '+esc(b.customer_name||'—')
      +(b.customer_phone?('<br>📞 <a href="tel:'+esc(b.customer_phone)+'">'+esc(b.customer_phone)+'</a>'):'')
      +(b.customer_email?('<br>✉️ '+esc(b.customer_email)):'')+'</div>'
    +(b.note?('<div class="d-note">'+esc(b.note)+'</div>'):'')
    +gap
    +'<div class="d-row"><span class="price">'+eur(b.total_price)+'</span>'+badge(b.status)+'</div>'
    +'<div class="d-actions">'
    +'<button class="act" data-id="'+b.id+'" data-s="potrjeno">Potrdi</button>'
    +'<button class="act" data-id="'+b.id+'" data-s="opravljeno">Opravljeno</button>'
    +'<button class="act danger" data-id="'+b.id+'" data-s="preklicano">Prekliči</button>'
    +'</div>';
  detailBody.querySelectorAll('.act').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=btn.getAttribute('data-id'),s=btn.getAttribute('data-s');
      if(s==='preklicano'&&!confirm('Prekličem to rezervacijo?'))return;
      btn.textContent='…';
      sb.from('bookings').update({status:s}).eq('id',id).then(function(res){
        if(res.error)alert('Napaka: '+res.error.message);
        detail.classList.add('hidden');load();
      });
    });
  });
  detail.classList.remove('hidden');
}

/* ZAGON */
sb.auth.getSession().then(function(res){ if(res.data&&res.data.session)showApp(res.data.session); else showLogin(); });
</script>
