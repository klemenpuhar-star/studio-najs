<!doctype html><meta charset="utf-8">
<style>
  body{margin:0;font-family:Poppins,system-ui,Arial,sans-serif;background:#e5ccb2;}
  .wrap{padding:34px 16px 44px;}
  .lbl{text-align:center;letter-spacing:.18em;text-transform:uppercase;font-size:.72rem;color:#d06666;margin:0 0 4px;}
  h2{text-align:center;font-family:Georgia,"Times New Roman",serif;color:#2c4251;font-size:2rem;margin:0 0 26px;font-weight:600;}
  .gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;max-width:760px;margin:0 auto;}
  @media(max-width:640px){.gallery-grid{gap:.7rem;}}
  .gal-item{aspect-ratio:4/5;border-radius:14px;overflow:hidden;background:rgba(23,57,75,.07);
    display:flex;align-items:center;justify-content:center;transition:transform .4s,box-shadow .4s;cursor:pointer;}
  .gal-item:hover{transform:scale(1.03);box-shadow:0 14px 32px rgba(23,57,75,.13);}
  .gal-item img{width:100%;height:100%;object-fit:cover;display:block;}
  .gal-video{position:relative;background:#000;}
  .gal-video img{width:100%;height:100%;object-fit:cover;display:block;opacity:.92;}
  .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:2.4rem;
    text-shadow:0 2px 12px rgba(0,0,0,.5);pointer-events:none;}
  .gal-sound{position:absolute;bottom:10px;right:10px;width:38px;height:38px;border:none;border-radius:50%;
    background:rgba(23,57,75,.6);color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;}
  .note{max-width:760px;margin:18px auto 0;text-align:center;font-size:.8rem;color:#2c4251;opacity:.7;}
</style>
